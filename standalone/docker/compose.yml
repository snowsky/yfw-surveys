services:
  api:
    build:
      context: ../..
      dockerfile: standalone/docker/api.Dockerfile
    env_file: [../../.env]
    ports:
      - "${API_PORT:-8001}:8001"
    volumes:
      - surveys_db:/app

  ui:
    build:
      context: ../..
      dockerfile: standalone/docker/ui.Dockerfile
    ports:
      - "${UI_PORT:-3001}:80"
    depends_on: [api]

